
{% extends "layout.html" %}

{% block page_title %}Server error{% endblock %}

{% block content %}
<section class="cc-shell section-wrap cc-reveal" style="margin-top: 30px;">
  <div class="section-head">
    <span class="section-label">Server Error</span>
    <h1 class="section-title">500</h1>
    <p class="section-text">
      Something went wrong on our side. Please try again in a moment.
    </p>
    <div class="form-actions" style="justify-content: center; margin-top: 16px;">
      <a href="{{ url_for('public.home') }}" class="cc-btn cc-btn--primary">Return Home</a>
    </div>
  </div>
</section>
{% endblock %}
